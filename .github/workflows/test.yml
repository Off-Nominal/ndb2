name: Test Suite

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  NODE_ENV: test
  # Must match api default; used for integration tests (ephemeral DBs + schema template).
  TEST_POSTGRES_BASE_URL: postgresql://test_user:test_password@localhost:5433/ndb2_test

jobs:
  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install database client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base postgresql-client

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Install dependencies
        run: pnpm install

      - name: Build workspace packages
        run: |
          pnpm --filter @offnominal/ndb2-api-types build
          pnpm --filter @offnominal/ndb2-db build

      - name: Start test database (Docker)
        working-directory: ./db/scripts
        run: |
          chmod +x start-db.sh
          ./start-db.sh test

      - name: Wait for Postgres on host port
        run: |
          until pg_isready -h localhost -p 5433 -U test_user -d ndb2_test; do
            echo "Waiting for database on localhost:5433..."
            sleep 2
          done

      - name: Run tests
        run: pnpm test
